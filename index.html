function makeId(p){return `${p}-${Math.random().toString(36).slice(2,9)}`;}
function formatDateShort(date){
  const dd=String(date.getDate()).padStart(2,'0');
  const mm=String(date.getMonth()+1).padStart(2,'0');
  const yy=String(date.getFullYear()).slice(-2);
  return `${dd}/${mm}/${yy}`;
}
function parseDateObj(value){
  if(value===undefined||value===null||value==='')return null;
  if(value instanceof Date && !isNaN(value))return new Date(value.getFullYear(),value.getMonth(),value.getDate(),12,0,0);
  if(typeof value==='number' && Number.isFinite(value)){
    const excelEpoch=new Date(Date.UTC(1899,11,30));
    const d=new Date(excelEpoch.getTime()+Math.round(value)*86400000);
    return new Date(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate(),12,0,0);
  }
  const s=String(value).trim();
  if(!s)return null;
  if(/^\d{5}(?:\.\d+)?$/.test(s)){
    const num=Number(s);
    if(Number.isFinite(num)){
      const excelEpoch=new Date(Date.UTC(1899,11,30));
      const d=new Date(excelEpoch.getTime()+Math.round(num)*86400000);
      return new Date(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate(),12,0,0);
    }
  }
  let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(m)return new Date(Number(m[1]),Number(m[2])-1,Number(m[3]),12,0,0);
  m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if(m){
    const a=Number(m[1]), b=Number(m[2]);
    const year=Number(m[3].length===2?`20${m[3]}`:m[3]);
    let day=a, month=b;
    if(a>12 && b<=12){day=a; month=b;}
    else if(b>12 && a<=12){month=a; day=b;}
    else {day=a; month=b;}
    const d=new Date(year,month-1,day,12,0,0);
    if(!isNaN(d))return d;
  }
  const parsed=new Date(s);
  if(!isNaN(parsed))return new Date(parsed.getFullYear(),parsed.getMonth(),parsed.getDate(),12,0,0);
  return null;
}
function todayValue(){return formatDateShort(new Date());}
function fmtDate(ds){const d=parseDateObj(ds);return d?formatDateShort(d):(ds||'—');}
function dateSortKey(value){
  const d=parseDateObj(value);
  if(!d)return '00000000';
  const yyyy=String(d.getFullYear());
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  return `${yyyy}${mm}${dd}`;
}
function compareDateDesc(a,b){return dateSortKey(b).localeCompare(dateSortKey(a));}
function compareDateAsc(a,b){return dateSortKey(a).localeCompare(dateSortKey(b));}
function dateInRange(value,from,to){
  const key=dateSortKey(value);
  if(from && key<dateSortKey(from))return false;
  if(to && key>dateSortKey(to))return false;
  return true;
}
function cleanDateInput(value){return String(value||'').replace(/[^\d\/\-]/g,'').slice(0,10);}
function normalizeDateInput(value,fallback=''){
  const d=parseDateObj(value);
  return d?formatDateShort(d):(fallback||cleanDateInput(value));
}
function getWeekNum(ds){
  const d=parseDateObj(ds);
  if(!d)return '';
  const fj=new Date(d.getFullYear(),0,1,12,0,0);
  return Math.ceil((Math.floor((d-fj)/86400000)+fj.getDay()+1)/7);
}
function normKey(v){return String(v??'').trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]/g,'');}
function normText(v){return String(v??'').trim();}

function toIsoDate(value,fallback=''){
  const d=parseDateObj(value);
  return d?formatDateShort(d):(fallback||todayValue());
}
function nameTokens(name){
  return String(name||'').toUpperCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^A-Z0-9 ]/g,' ').replace(/\s+/g,' ').trim().split(' ').filter(Boolean);
}
function findEmployeeMatch(employees,rawLegajo='',rawName=''){
  const legajo=String(rawLegajo||'').trim();
  if(legajo){
    const exactByLegajo=employees.find(e=>String(e.legajo)===legajo);
    if(exactByLegajo)return exactByLegajo;
  }
  const name=String(rawName||'').trim();
  if(!name)return null;
  const nk=normKey(name);
  let exact=employees.find(e=>normKey(e.nombre)===nk);
  if(exact)return exact;
  let contains=employees.find(e=>normKey(e.nombre).includes(nk)||nk.includes(normKey(e.nombre)));
  if(contains)return contains;
  const srcAll=nameTokens(name);
  const srcLong=srcAll.filter(t=>t.length>1);
  const srcShort=srcAll.filter(t=>t.length===1);
  let best=null;
  let bestScore=-1;
  employees.forEach(emp=>{
    const empAll=nameTokens(emp.nombre);
    const empLong=empAll.filter(t=>t.length>1);
    let score=0;
    if(srcAll[0]&&empAll[0]&&srcAll[0]===empAll[0])score+=4;
    if(srcAll[srcAll.length-1]&&empAll[empAll.length-1]&&srcAll[srcAll.length-1]===empAll[empAll.length-1])score+=2;
    const common=srcLong.filter(t=>empLong.includes(t)).length;
    score+=common*2;
    const initialMatches=srcShort.filter(t=>empLong.some(et=>et.startsWith(t))).length;
    score+=initialMatches;
    if(score>bestScore){bestScore=score;best=emp;}
  });
  const minScore=srcLong.length>=2?4:3;
  return bestScore>=minScore?best:null;
}

function calcHours(e,s){if(!e||!s)return 0;const [sh,sm]=e.split(':').map(Number),[eh,em]=s.split(':').map(Number);let end=eh*60+em;const st=sh*60+sm;if(end<st)end+=1440;return Number(((end-st)/60).toFixed(2));}
function attScore(s){if(s==='Presente')return 100;if(s==='Tarde')return 80;if(s==='Media jornada')return 60;if(s==='Ausente')return 0;return null;}
function qualScore(q){if(q==='Sin errores')return 100;if(q==='1 error leve')return 85;if(q==='2 errores')return 70;if(q==='Error grave')return 40;return null;}
function semColor(sc,tipo,est){if(tipo!=='Operario')return 'NA';if(est==='Ausente')return 'ROJO';if(sc===null)return 'NA';return sc>=85?'VERDE':sc>=70?'AMARILLO':'ROJO';}
function defaultEntrada(turno){return turno==='Noche'?'22:00':'08:00';}
function defaultSalida(turno){return turno==='Noche'?'06:00':'17:00';}
function sortByName(arr){return [...arr].sort((a,b)=>String(a.nombre||'').localeCompare(String(b.nombre||'')));}
function weekColor(week){const colors=['#e0e7ff','#d1fae5','#fef3c7','#ffe4e6','#ede9fe','#e0f2fe','#ffedd5'];return colors[Math.abs(Number(week)||0)%colors.length];}
function unique(arr){return Array.from(new Set(arr));}
function dayTitle(value){
  const d=parseDateObj(value);
  if(!d)return fmtDate(value);
  const days=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  return `${days[d.getDay()]} ${formatDateShort(d)}`;
}
function addDaysToDateStr(value,days){
  const d=parseDateObj(value)||new Date();
  d.setDate(d.getDate()+days);
  return formatDateShort(d);
}
function daySectionColor(index){
  const colors=['#c4b5fd','#fdba74','#86efac','#93c5fd','#f9a8d4','#fcd34d','#67e8f9'];
  return colors[Math.abs(Number(index)||0)%colors.length];
}

function computeRecord(fields){
  const e=fields.employee;
  const estadoDia=fields.estadoDia||'Presente';
  const entrada=fields.entrada||(['Presente','Tarde','Media jornada'].includes(estadoDia)?defaultEntrada(e.turno):'');
  const salida=fields.salida||(['Presente','Tarde','Media jornada'].includes(estadoDia)?defaultSalida(e.turno):'');
  const produccionReal=Number(fields.produccionReal||0);
  const calidad=fields.calidad||(e.tipoEmpleado==='Operario'?'Sin errores':'No aplica');
  const horas=calcHours(entrada,salida);
  const puntajeAsistencia=attScore(estadoDia);
  const puntajeCalidad=qualScore(calidad);
  const cumplimiento=e.metaDiaria>0?Number(((produccionReal/e.metaDiaria)*100).toFixed(0)):0;
  const puntajeRendimiento=e.metaDiaria>0?Math.min(cumplimiento,120):null;
  const puntajeFinal=e.tipoEmpleado!=='Operario'||puntajeAsistencia===null?null:Math.round(puntajeAsistencia*0.4+(puntajeRendimiento??0)*0.4+(puntajeCalidad??100)*0.2);
  return {
    id:fields.id||makeId('rec'),
    fecha:fields.fecha,
    semana:getWeekNum(fields.fecha),
    legajo:e.legajo,
    nombre:e.nombre,
    sector:fields.sector||e.sector,
    turno:e.turno,
    tipoEmpleado:e.tipoEmpleado,
    supervisor:e.supervisor,
    estadoDia,
    entrada,
    salida,
    horas,
    presenteOperativo:e.tipoEmpleado==='Operario'&&['Presente','Tarde','Media jornada'].includes(estadoDia)?'Sí':'No',
    produccionReal,
    metaDiaria:Number(e.metaDiaria||0),
    cumplimiento,
    calidad,
    puntajeAsistencia,
    puntajeRendimiento,
    puntajeCalidad,
    puntajeFinal,
    semaforo:semColor(puntajeFinal,e.tipoEmpleado,estadoDia),
    observaciones:fields.observaciones||''
  };
}
function upsertAttendance(records, employee, payload){
  const existing=records.find(r=>r.fecha===payload.fecha&&String(r.legajo)===String(employee.legajo));
  const next=computeRecord({
    id:existing?.id,
    employee,
    fecha:payload.fecha,
    estadoDia:payload.estadoDia,
    entrada:payload.entrada,
    salida:payload.salida,
    produccionReal:existing?.produccionReal||0,
    calidad:existing?.calidad||(employee.tipoEmpleado==='Operario'?'Sin errores':'No aplica'),
    observaciones:[existing?.observaciones,payload.observaciones].filter(Boolean).join(existing?.observaciones&&payload.observaciones?' | ':'')
  });
  return existing?records.map(r=>r.id===existing.id?next:r):[next,...records];
}

function upsertProduction(records, employee, payload){
  const existing=records.find(r=>r.fecha===payload.fecha&&String(r.legajo)===String(employee.legajo));
  const next=computeRecord({
    id:existing?.id,
    employee,
    fecha:payload.fecha,
    sector:payload.sector||existing?.sector||employee.sector,
    estadoDia:existing?.estadoDia||'Presente',
    entrada:existing?.entrada||defaultEntrada(employee.turno),
    salida:existing?.salida||defaultSalida(employee.turno),
    produccionReal:Number(payload.produccionReal||0),
    calidad:payload.calidad||(employee.tipoEmpleado==='Operario'?'Sin errores':'No aplica'),
    observaciones:[existing?.observaciones,payload.observaciones].filter(Boolean).join(existing?.observaciones&&payload.observaciones?' | ':'')
  });
  return existing?records.map(r=>r.id===existing.id?next:r):[next,...records];
}

function exportCsv(filename,headers,rows){
  const esc=v=>`"${String(v??'').replace(/"/g,'""')}"`;
  const csv=[headers.map(esc).join(','),...rows.map(r=>r.map(esc).join(','))].join('\n');
  const url=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
}
function parseFlexibleFile(file, onData, onError){
  if(!file){onError(['No seleccionaste archivo.']);return;}
  const ext=(file.name||'').split('.').pop().toLowerCase();
  const reader=new FileReader();
  if(['xlsx','xls','xlsm'].includes(ext)){
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
        const sheet=wb.Sheets[wb.SheetNames[0]];
        const data=XLSX.utils.sheet_to_json(sheet,{defval:'',raw:true,dateNF:'dd/mm/yyyy'});
        onData(data);
      }catch(err){onError(['No se pudo leer el Excel.']);}
    };
    reader.readAsArrayBuffer(file);
  }else{
    reader.onload=e=>{
      try{
        const text=String(e.target.result||'');
        const sep=text.includes(';')?';':(text.includes('\t')?'\t':',');
        const lines=text.split(/\r?\n/).filter(l=>l.trim());
        if(lines.length<2){onError(['Archivo vacío o sin datos.']);return;}
        const headers=lines[0].split(sep).map(h=>h.replace(/"/g,'').trim());
        const rows=lines.slice(1).map(line=>{const vals=line.split(sep).map(v=>v.replace(/"/g,'').trim());const obj={};headers.forEach((h,i)=>obj[h]=vals[i]??'');return obj;});
        onData(rows);
      }catch(err){onError(['No se pudo leer el archivo.']);}
    };
    reader.readAsText(file,'UTF-8');
  }
}

function DataTable({headers,rows,searchQ=''}){

/* ────────── CHARTS ────────── */
function BarChart({labels,datasets,height=220,stacked=false}){
  const ref=useRef();const chartRef=useRef();
  useEffect(()=>{if(!ref.current)return;if(chartRef.current)chartRef.current.destroy();chartRef.current=new Chart(ref.current,{type:'bar',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:11},boxWidth:12}},tooltip:{mode:'index'}},scales:{x:{stacked,grid:{display:false},ticks:{font:{size:11}}},y:{stacked,beginAtZero:true,grid:{color:'#f1f5f9'},ticks:{font:{size:11}}}}}});return()=>chartRef.current?.destroy();},[JSON.stringify(labels),JSON.stringify(datasets),stacked]);
  return <div style={{height}}><canvas ref={ref}/></div>;
}
function LineChart({labels,datasets,height=220,yMax}){
  const ref=useRef();const chartRef=useRef();
  useEffect(()=>{
    if(!ref.current)return;
    if(chartRef.current)chartRef.current.destroy();
    const maxData=(datasets||[]).reduce((acc,ds)=>Math.max(acc,...((Array.isArray(ds.data)?ds.data:[]).filter(v=>typeof v==='number'&&isFinite(v)))),0);
    const finalMax=yMax?Math.max(yMax,Math.ceil(maxData*1.08)||yMax):Math.max(10,Math.ceil(maxData*1.08));
    const lineDatasets=(datasets||[]).map(ds=>({
      ...ds,
      borderWidth:ds.borderWidth??3,
      pointRadius:ds.pointRadius??4,
      pointHoverRadius:ds.pointHoverRadius??6,
      pointHitRadius:ds.pointHitRadius??12,
      pointBorderWidth:ds.pointBorderWidth??2,
      spanGaps:true,
      clip:16
    }));
    chartRef.current=new Chart(ref.current,{type:'line',data:{labels,datasets:lineDatasets},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:16,right:10,left:6,bottom:4}},plugins:{legend:{position:'top',labels:{font:{size:11},boxWidth:12}},tooltip:{mode:'index'}},elements:{point:{radius:4,hoverRadius:6},line:{tension:0.35}},scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{beginAtZero:true,suggestedMax:finalMax,grace:'8%',grid:{color:'#f1f5f9'},ticks:{font:{size:11}}}}}});
    return()=>chartRef.current?.destroy();
  },[JSON.stringify(labels),JSON.stringify(datasets),yMax]);
  return <div style={{height}}><canvas ref={ref}/></div>;
}
function DonutChart({labels,data,colors,height=180}){
  const ref=useRef();const chartRef=useRef();
  useEffect(()=>{if(!ref.current)return;if(chartRef.current)chartRef.current.destroy();chartRef.current=new Chart(ref.current,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:C.white}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11},boxWidth:12}}}}});return()=>chartRef.current?.destroy();},[JSON.stringify(labels),JSON.stringify(data),JSON.stringify(colors)]);
  return <div style={{height}}><canvas ref={ref}/></div>;
}

    const tipo=ETYPES.find(t=>normKey(t)===normKey(obj.tipoempleado||obj.tipo||''))||'Operario';
    const turno=TURNOS.find(t=>normKey(t)===normKey(obj.turno||''))||'Día';

      <div style={{maxHeight:'320px',overflow:'auto',borderRadius:'10px',border:`1px solid ${C.s200}`,marginBottom:'16px'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px'}}><thead style={{position:'sticky',top:0,background:`linear-gradient(90deg,${C.indigoL},${C.violetL})`}}><tr>{['Legajo','Nombre','Sector','Turno','Tipo','Meta'].map(h=><th key={h} style={{padding:'8px 10px',textAlign:'left',fontWeight:700,color:C.indigoD}}>{h}</th>)}</tr></thead><tbody>{preview.map((r,i)=><tr key={i} style={{borderBottom:`1px solid ${C.s100}`,background:i%2===0?C.white:C.s50}}><td style={{padding:'7px 10px',fontFamily:'monospace',color:C.indigoD}}>{r.legajo}</td><td style={{padding:'7px 10px',fontWeight:600}}>{r.nombre}</td><td style={{padding:'7px 10px'}}>{r.sector}</td><td style={{padding:'7px 10px'}}>{r.turno}</td><td style={{padding:'7px 10px'}}>{r.tipoEmpleado}</td><td style={{padding:'7px 10px'}}>{r.metaDiaria}</td></tr>)}</tbody></table>

function ImportAttendanceModal({onClose,onImport,employees=[]}){
  const [step,setStep]=useState('upload');const [preview,setPreview]=useState([]);const [errors,setErrors]=useState([]);const [drag,setDrag]=useState(false);const fileRef=useRef();

  function handleData(data){
    const rows=[];const errs=[];let lastDate=todayValue();
    (data||[]).forEach((raw,idx)=>{
      const obj={};Object.entries(raw||{}).forEach(([k,v])=>{const nk=normKey(k);obj[nk]=nk==='fecha'?v:normText(v);});
      if(Object.values(obj).every(v=>!v))return;

      const nombreRaw=obj.operariosupervisor||obj.nombre||obj.empleado||obj.apellidoynombre||'';
      const isPresentesFechaFormat=('operariosupervisor' in obj)||('presente' in obj)||('ausente' in obj);

      if(isPresentesFechaFormat){
        const fecha=obj.fecha?toIsoDate(obj.fecha,lastDate):lastDate;
        if(obj.fecha)lastDate=fecha;
        if(!nombreRaw)return;
        const emp=findEmployeeMatch(employees,obj.legajo||'',nombreRaw);
        if(!emp){errs.push(`Fila ${idx+2}: "${nombreRaw}" no encontrado en personal`);return;}
        const presMark=String(obj.presente||'').trim().toUpperCase();
        const ausMark=String(obj.ausente||'').trim().toUpperCase();
        let estadoDia='';
        if(presMark==='1'||presMark==='SI'||presMark==='SÍ')estadoDia='Presente';
        else if(ausMark==='X'||ausMark==='1'||ausMark==='SI'||ausMark==='SÍ')estadoDia='Ausente';
        else if(obj.estado||obj.estadodia)estadoDia=DAY_ST.find(s=>normKey(s)===normKey(obj.estadodia||obj.estado||''))||'';
        if(!estadoDia){errs.push(`Fila ${idx+2}: no se pudo interpretar si "${nombreRaw}" está presente o ausente`);return;}
        rows.push({fecha,legajo:emp.legajo,nombre:emp.nombre,estadoDia,entrada:'',salida:'',observaciones:'Importado desde PRESENTES DE LA FECHA'});
        return;
      }

      const fecha=obj.fecha?toIsoDate(obj.fecha,lastDate):lastDate;
      if(obj.fecha)lastDate=fecha;
      const emp=findEmployeeMatch(employees,obj.legajo||obj.codigo||obj.id||'',nombreRaw);
      if(!emp){errs.push(`Fila ${idx+2}: empleado no encontrado`);return;}
      const estadoDia=DAY_ST.find(s=>normKey(s)===normKey(obj.estadodia||obj.estado||''))||'Presente';
      rows.push({fecha,legajo:emp.legajo,nombre:emp.nombre,estadoDia,entrada:obj.entrada||obj.e||'',salida:obj.salida||obj.s||'',observaciones:obj.observaciones||''});
    });
    setPreview(rows);setErrors(errs);if(rows.length>0)setStep('preview');else setErrors(errs.length?errs:['No se encontraron filas válidas.']);
  }

  return <BaseModal title='🟢 Importar presentismo' subtitle='Entiende el archivo PRESENTES DE LA FECHA: 1 = Presente, X = Ausente' onClose={onClose} color='emerald'>

      <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);parseFlexibleFile(e.dataTransfer.files[0],handleData,setErrors);}} onClick={()=>fileRef.current.click()} style={{border:`2.5px dashed ${drag?C.emerald:C.s300}`,borderRadius:'14px',padding:'36px',textAlign:'center',cursor:'pointer',background:drag?C.emeraldL:C.s50,marginBottom:'16px'}}>
        <div style={{fontSize:'40px',marginBottom:'10px'}}>🟢</div>
        <div style={{fontSize:'14px',fontWeight:700,color:C.s700}}>Arrastrá el archivo PRESENTES DE LA FECHA o hacé click</div>
        <div style={{fontSize:'12px',color:C.s500,marginTop:'4px'}}>Reconoce FECHA / OPERARIO-SUPERVISOR / PRESENTE / AUSENTE</div>
        <input ref={fileRef} type='file' accept='.csv,.xlsx,.xls' style={{display:'none'}} onChange={e=>parseFlexibleFile(e.target.files[0],handleData,setErrors)}/>
      </div>
      {errors.length>0&&<div style={{padding:'12px',background:C.roseL,borderRadius:'10px'}}>{errors.map((e,i)=><div key={i} style={{fontSize:'12px',color:C.roseD}}>• {e}</div>)}</div>}
    </div>}
    {step==='preview'&&<div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}><div style={{fontWeight:700,color:C.s800}}>{preview.length} filas para importar</div><BtnS onClick={()=>{setStep('upload');setPreview([]);setErrors([]);}}>← Cambiar</BtnS></div>
      {errors.length>0&&<div style={{marginBottom:'12px',padding:'12px',background:C.amberL,borderRadius:'10px'}}>{errors.map((e,i)=><div key={i} style={{fontSize:'11px',color:C.amberD}}>• {e}</div>)}</div>}
      <div style={{maxHeight:'320px',overflow:'auto',borderRadius:'10px',border:`1px solid ${C.s200}`,marginBottom:'16px'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px'}}><thead style={{position:'sticky',top:0,background:`linear-gradient(90deg,${C.emeraldL},${C.indigoL})`}}><tr>{['Fecha','Legajo','Nombre','Estado'].map(h=><th key={h} style={{padding:'8px 10px',textAlign:'left',fontWeight:700,color:C.emeraldD}}>{h}</th>)}</tr></thead><tbody>{preview.map((r,i)=><tr key={i} style={{borderBottom:`1px solid ${C.s100}`,background:i%2===0?C.white:C.s50}}><td style={{padding:'7px 10px'}}>{fmtDate(r.fecha)}</td><td style={{padding:'7px 10px',fontFamily:'monospace'}}>{r.legajo}</td><td style={{padding:'7px 10px',fontWeight:600}}>{r.nombre}</td><td style={{padding:'7px 10px'}}><StatusBadge value={r.estadoDia}/></td></tr>)}</tbody></table>

  </BaseModal>;
}



function ImportDailyModal({onClose,onImport,employees=[]}){
  const [step,setStep]=useState('upload');const [preview,setPreview]=useState([]);const [errors,setErrors]=useState([]);const [drag,setDrag]=useState(false);const fileRef=useRef();

  function parseProduccionXDiaWorkbook(wb){
    const rows=[];const errs=[];
    wb.SheetNames.forEach(shName=>{
      const sh=wb.Sheets[shName];
      const matrix=XLSX.utils.sheet_to_json(sh,{header:1,defval:'',raw:false});
      const headerIdx=matrix.findIndex(row=>{
        const keys=(row||[]).map(c=>normKey(c));
        return keys.includes('fecha')&&keys.includes('empleado')&&keys.includes('sector')&&keys.includes('cantidadproducida');
      });
      if(headerIdx<0)return;
      const headers=(matrix[headerIdx]||[]).map(c=>normKey(c));
      const ixFecha=headers.findIndex(h=>h==='fecha');
      const ixEmpleado=headers.findIndex(h=>h==='empleado'||h==='operario');
      const ixSector=headers.findIndex(h=>h==='sector');
      const ixCantidad=headers.findIndex(h=>h==='cantidadproducida'||h==='cantidad'||h==='produccion'||h==='produccionreal');
      const ixObs=headers.findIndex(h=>h==='observaciones'||h==='observacion');
      for(let i=headerIdx+1;i<matrix.length;i++){
        const row=matrix[i]||[];
        const fechaRaw=row[ixFecha];
        const nombreRaw=normText(row[ixEmpleado]);
        const sectorRaw=normText(row[ixSector]);
        const cantidadRaw=row[ixCantidad];
        const observaciones=ixObs>=0?normText(row[ixObs]):'';
        if(!fechaRaw&&!nombreRaw&&!sectorRaw&&!cantidadRaw)continue;
        const cantidad=Number(String(cantidadRaw??'').replace(',','.'));
        if(!nombreRaw||!sectorRaw||!Number.isFinite(cantidad))continue;
        const emp=findEmployeeMatch(employees,'',nombreRaw);
        if(!emp){errs.push(`Fila ${i+1}: "${nombreRaw}" no encontrado en personal`);continue;}
        rows.push({fecha:toIsoDate(fechaRaw,todayValue()),legajo:emp.legajo,nombre:emp.nombre,sector:sectorRaw||emp.sector,produccionReal:cantidad,calidad:emp.tipoEmpleado==='Operario'?'Sin errores':'No aplica',observaciones:observaciones||'Importado desde PRODUCCIONXDIA'});
      }
    });
    return {rows,errs};
  }

  function parseGenericRows(data){
    const rows=[];const errs=[];let lastDate=todayValue();
    (data||[]).forEach((raw,idx)=>{
      const obj={};Object.entries(raw||{}).forEach(([k,v])=>{const nk=normKey(k);obj[nk]=nk==='fecha'?v:normText(v);});
      if(Object.values(obj).every(v=>!v))return;
      const fecha=obj.fecha?toIsoDate(obj.fecha,lastDate):lastDate;
      if(obj.fecha)lastDate=fecha;
      const nombreRaw=obj.nombre||obj.empleado||obj.apellidoynombre||'';
      const emp=findEmployeeMatch(employees,obj.legajo||obj.codigo||obj.id||'',nombreRaw);
      if(!emp){errs.push(`Fila ${idx+2}: empleado no encontrado`);return;}
      const cantidad=Number(String(obj.cantidadproducida||obj.produccionreal||obj.produccion||obj.cantidad||'0').replace(',','.'));
      if(!Number.isFinite(cantidad)){errs.push(`Fila ${idx+2}: cantidad inválida`);return;}
      rows.push({fecha,legajo:emp.legajo,nombre:emp.nombre,sector:obj.sector||emp.sector,produccionReal:cantidad,calidad:QUAL.find(q=>normKey(q)===normKey(obj.calidad||''))||(emp.tipoEmpleado==='Operario'?'Sin errores':'No aplica'),observaciones:obj.observaciones||''});
    });
    return {rows,errs};
  }

  function handleFile(file){
    if(!file){setErrors(['No seleccionaste archivo.']);return;}
    const ext=(file.name||'').split('.').pop().toLowerCase();
    if(['xlsx','xls','xlsm'].includes(ext)){
      const reader=new FileReader();
      reader.onload=e=>{
        try{
          const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
          const parsed=parseProduccionXDiaWorkbook(wb);
          if(parsed.rows.length>0){setPreview(parsed.rows);setErrors(parsed.errs);setStep('preview');return;}
          const sh=wb.Sheets[wb.SheetNames[0]];
          const data=XLSX.utils.sheet_to_json(sh,{defval:'',raw:false});
          const generic=parseGenericRows(data);
          setPreview(generic.rows);setErrors(generic.errs);
          if(generic.rows.length>0)setStep('preview'); else setErrors(generic.errs.length?generic.errs:['No se encontraron filas válidas.']);
        }catch(err){setErrors(['No se pudo leer el Excel.']);}
      };
      reader.readAsArrayBuffer(file);
    }else{
      parseFlexibleFile(file,data=>{
        const generic=parseGenericRows(data);
        setPreview(generic.rows);setErrors(generic.errs);
        if(generic.rows.length>0)setStep('preview'); else setErrors(generic.errs.length?generic.errs:['No se encontraron filas válidas.']);
      },setErrors);
    }
  }

  return <BaseModal title='📊 Importar carga diaria' subtitle='Entiende el archivo PRODUCCIONXDIA: Fecha, Empleado, Sector y Cantidad producida' onClose={onClose} color='emerald'>
    {step==='upload'&&<div>
      <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);handleFile(e.dataTransfer.files[0]);}} onClick={()=>fileRef.current.click()} style={{border:`2.5px dashed ${drag?C.emerald:C.s300}`,borderRadius:'14px',padding:'36px',textAlign:'center',cursor:'pointer',background:drag?C.emeraldL:C.s50,marginBottom:'16px'}}>
        <div style={{fontSize:'40px',marginBottom:'10px'}}>📊</div>
        <div style={{fontSize:'14px',fontWeight:700,color:C.s700}}>Arrastrá el archivo PRODUCCIONXDIA o hacé click</div>
        <div style={{fontSize:'12px',color:C.s500,marginTop:'4px'}}>Reconoce la tabla con columnas Fecha / Empleado / Sector / Cantidad producida</div>
        <input ref={fileRef} type='file' accept='.csv,.xlsx,.xls' style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
      </div>
      {errors.length>0&&<div style={{padding:'12px',background:C.roseL,borderRadius:'10px'}}>{errors.map((e,i)=><div key={i} style={{fontSize:'12px',color:C.roseD}}>• {e}</div>)}</div>}
    </div>}
    {step==='preview'&&<div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}><div style={{fontWeight:700,color:C.s800}}>{preview.length} filas para importar</div><BtnS onClick={()=>{setStep('upload');setPreview([]);setErrors([]);}}>← Cambiar</BtnS></div>
      {errors.length>0&&<div style={{marginBottom:'12px',padding:'12px',background:C.amberL,borderRadius:'10px'}}>{errors.map((e,i)=><div key={i} style={{fontSize:'11px',color:C.amberD}}>• {e}</div>)}</div>}
      <div style={{maxHeight:'320px',overflow:'auto',borderRadius:'10px',border:`1px solid ${C.s200}`,marginBottom:'16px'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px'}}><thead style={{position:'sticky',top:0,background:`linear-gradient(90deg,${C.emeraldL},${C.indigoL})`}}><tr>{['Fecha','Legajo','Nombre','Sector','Cantidad','Calidad'].map(h=><th key={h} style={{padding:'8px 10px',textAlign:'left',fontWeight:700,color:C.emeraldD}}>{h}</th>)}</tr></thead><tbody>{preview.map((r,i)=><tr key={i} style={{borderBottom:`1px solid ${C.s100}`,background:i%2===0?C.white:C.s50}}><td style={{padding:'7px 10px'}}>{fmtDate(r.fecha)}</td><td style={{padding:'7px 10px',fontFamily:'monospace'}}>{r.legajo}</td><td style={{padding:'7px 10px',fontWeight:600}}>{r.nombre}</td><td style={{padding:'7px 10px'}}>{r.sector}</td><td style={{padding:'7px 10px',fontWeight:700,color:C.emeraldD}}>{r.produccionReal}</td><td style={{padding:'7px 10px'}}>{r.calidad}</td></tr>)}</tbody></table>
      </div>
      <div style={{display:'flex',gap:'10px'}}><BtnP onClick={()=>{onImport(preview);setStep('done');}}>✅ Importar {preview.length}</BtnP><BtnN onClick={onClose}>Cancelar</BtnN></div>
    </div>}
    {step==='done'&&<div style={{textAlign:'center',padding:'24px 0'}}><div style={{fontSize:'48px',marginBottom:'12px'}}>✅</div><div style={{fontSize:'16px',fontWeight:800,color:C.emeraldD,marginBottom:'8px'}}>Carga importada</div><BtnP onClick={onClose}>Cerrar</BtnP></div>}
  </BaseModal>;
}


function normalizeLoadedRecord(r){
  const fecha=toIsoDate(r?.fecha,todayValue());
  return {...r,fecha,semana:getWeekNum(fecha)};
}
function normalizeLoadedMovement(m){
  return {...m,fecha:toIsoDate(m?.fecha,todayValue())};
}

/* ────────── APP ────────── */
function App(){
  const [employees,setEmployees]=useState(()=>lsGet(SK.e,IEMP));
  const [movements,setMovements]=useState(()=>lsGet(SK.m,IMOV).map(normalizeLoadedMovement));
  const [records,setRecords]=useState(()=>lsGet(SK.r,IREC).map(normalizeLoadedRecord));
  const [tab,setTab]=useState('DASHBOARD_HOY');
  const [showEmpImport,setShowEmpImport]=useState(false);
  const [showAttendanceImport,setShowAttendanceImport]=useState(false);
  const [showDailyImport,setShowDailyImport]=useState(false);
  const [globalSearch,setGlobalSearch]=useState('');
  const [filters,setFilters]=useState({fecha:todayValue(),sector:'Todos',turno:'Todos',supervisor:'Todos'});
  const [weekFilter,setWeekFilter]=useState('Todas');
  const emptyEmp={id:null,legajo:'',nombre:'',sector:'',turno:'Día',tipoEmpleado:'Operario',supervisor:'',metaDiaria:'0',activo:true};
  const [empForm,setEmpForm]=useState(emptyEmp);
  const [presentForm,setPresentForm]=useState({fecha:todayValue(),legajo:'',estadoDia:'Presente',entrada:'',salida:'',observaciones:''});
  const [dailyForm,setDailyForm]=useState({fecha:todayValue(),legajo:'',produccionReal:'',calidad:'Sin errores',observaciones:''});
  const [fichaLeg,setFichaLeg]=useState('');
  const [compareSelect,setCompareSelect]=useState('');
  const [compareLegs,setCompareLegs]=useState([]);
  const [histFilters,setHistFilters]=useState({texto:'',tipo:'Todos',fechaDesde:'',fechaHasta:'',semana:'Todas',estado:'Todos',sector:'Todos'});
  const [dashboardExpanded,setDashboardExpanded]=useState(false);
  const [dashboardRange,setDashboardRange]=useState({desde:'',hasta:''});
  const [presentListFilters,setPresentListFilters]=useState({fecha:todayValue(),legajo:'Todos'});
  const [dailyListFilters,setDailyListFilters]=useState({fecha:todayValue(),legajo:'Todos'});

  useEffect(()=>lsSet(SK.e,employees),[employees]);
  useEffect(()=>lsSet(SK.m,movements),[movements]);
  useEffect(()=>lsSet(SK.r,records),[records]);
  useEffect(()=>{
    const active=sortByName(employees.filter(e=>e.activo));
    if(active.length){
      if(!presentForm.legajo||!active.some(e=>e.legajo===presentForm.legajo))setPresentForm(p=>({...p,legajo:active[0].legajo}));
      if(!dailyForm.legajo||!active.some(e=>e.legajo===dailyForm.legajo))setDailyForm(p=>({...p,legajo:active[0].legajo,calidad:active[0].tipoEmpleado==='Operario'?'Sin errores':'No aplica'}));
      if(!fichaLeg||!employees.some(e=>e.legajo===fichaLeg))setFichaLeg(active[0].legajo);
      if(!compareSelect||!active.some(e=>e.legajo===compareSelect)||compareSelect===fichaLeg){const next=active.find(e=>e.legajo!==fichaLeg);setCompareSelect(next?.legajo||'');}
    } else {
      setPresentForm(p=>({...p,legajo:''}));setDailyForm(p=>({...p,legajo:''}));setFichaLeg('');setCompareSelect('');setCompareLegs([]);
    }
  },[employees,fichaLeg]);
  useEffect(()=>{setCompareLegs(prev=>prev.filter(l=>l!==fichaLeg&&employees.some(e=>e.legajo===l&&e.activo)));},[fichaLeg,employees]);
  useEffect(()=>{
    if((!dashboardRange.desde&&!dashboardRange.hasta)&&records.length){
      const dates=unique(records.map(r=>r.fecha)).sort(compareDateAsc);
      const hasta=dates[dates.length-1];
      const desde=dates[Math.max(0,dates.length-7)]||hasta;
      setDashboardRange({desde,hasta});
    }
  },[records,dashboardRange.desde,dashboardRange.hasta]);

  const activeEmployees=useMemo(()=>sortByName(employees.filter(e=>e.activo)),[employees]);
  const inactiveEmployees=useMemo(()=>sortByName(employees.filter(e=>!e.activo)),[employees]);
  const sectors=useMemo(()=>sortByName(unique(activeEmployees.map(e=>e.sector)).map(s=>({nombre:s}))).map(x=>x.nombre),[activeEmployees]);
  const turnos_=useMemo(()=>sortByName(unique(activeEmployees.map(e=>e.turno)).map(s=>({nombre:s}))).map(x=>x.nombre),[activeEmployees]);
  const supervisors=useMemo(()=>sortByName(unique(activeEmployees.map(e=>e.supervisor||'Sin supervisor')).map(s=>({nombre:s}))).map(x=>x.nombre),[activeEmployees]);
  const allWeeks=useMemo(()=>unique(records.map(r=>String(r.semana))).filter(Boolean).sort((a,b)=>Number(b)-Number(a)),[records]);

  const dashboardDateOptions=useMemo(()=>unique(records.map(r=>r.fecha)).sort(compareDateAsc),[records]);
  const filteredRecords=useMemo(()=>records.filter(r=>dateInRange(r.fecha,dashboardRange.desde,dashboardRange.hasta)&&(filters.sector==='Todos'||r.sector===filters.sector)&&(filters.turno==='Todos'||r.turno===filters.turno)&&(filters.supervisor==='Todos'||(r.supervisor||'Sin supervisor')===filters.supervisor)),[records,dashboardRange,filters]);
  const searchedRecords=useMemo(()=>{if(!globalSearch.trim())return records;const q=globalSearch.toLowerCase();return records.filter(r=>[r.fecha,r.legajo,r.nombre,r.sector,r.turno,r.tipoEmpleado,r.estadoDia,r.observaciones].join(' ').toLowerCase().includes(q));},[records,globalSearch]);

  const dashboardKpis=useMemo(()=>{
    const present=filteredRecords.filter(r=>['Presente','Tarde','Media jornada'].includes(r.estadoDia)).length;
    const absent=filteredRecords.filter(r=>r.estadoDia==='Ausente').length;
    const ops=filteredRecords.filter(r=>r.presenteOperativo==='Sí');
    return {
      total:filteredRecords.length,
      presentes:present,
      ausentes:absent,
      operativos:ops.length,
      rend:ops.length?`${Math.round(ops.reduce((a,r)=>a+r.cumplimiento,0)/ops.length)}%`:'—',
      verdes:filteredRecords.filter(r=>r.semaforo==='VERDE').length,
      amarillos:filteredRecords.filter(r=>r.semaforo==='AMARILLO').length,
      rojos:filteredRecords.filter(r=>r.semaforo==='ROJO').length,
    };
  },[filteredRecords]);

  const alerts=useMemo(()=>{const out=[];filteredRecords.forEach(r=>{if(r.estadoDia==='Ausente')out.push({t:'danger',txt:`${r.nombre} ausente`});if(r.tipoEmpleado==='Operario'&&r.cumplimiento>0&&r.cumplimiento<80)out.push({t:'warn',txt:`${r.nombre} bajo 80% de meta`});if(r.calidad==='Error grave'||r.calidad==='2 errores')out.push({t:'danger',txt:`Revisar calidad de ${r.nombre}`});});return out.slice(0,8);},[filteredRecords]);

  const weekly=useMemo(()=>{
    const map=new Map();
    records.forEach(r=>{
      const key=`${r.semana}-${r.legajo}`;
      if(!map.has(key))map.set(key,{semana:r.semana,legajo:r.legajo,nombre:r.nombre,sector:r.sector,prog:0,pres:0,tarde:0,ausente:0,cumSum:0,cumCount:0,err:0,puntajeSum:0,puntajeCount:0});
      const it=map.get(key);
      if(!['Franco','Licencia','Vacaciones'].includes(r.estadoDia))it.prog++;
      if(['Presente','Tarde','Media jornada'].includes(r.estadoDia))it.pres++;
      if(r.estadoDia==='Tarde')it.tarde++;
      if(r.estadoDia==='Ausente')it.ausente++;
      if(r.tipoEmpleado==='Operario'&&r.metaDiaria>0){it.cumSum+=r.cumplimiento;it.cumCount++;}
      if(r.calidad==='1 error leve')it.err++;
      if(r.calidad==='2 errores')it.err+=2;
      if(r.calidad==='Error grave')it.err+=3;
      if(r.puntajeFinal!==null){it.puntajeSum+=r.puntajeFinal;it.puntajeCount++;}
    });
    return Array.from(map.values()).map(it=>{const asistencia=it.prog?Math.round((it.pres/it.prog)*100):0;const rendimiento=it.cumCount?Math.round(it.cumSum/it.cumCount):0;const puntaje=it.puntajeCount?Math.round(it.puntajeSum/it.puntajeCount):null;return {...it,asistencia,rendimiento,puntaje,sem:semColor(puntaje,'Operario',asistencia===0?'Ausente':'Presente')};}).sort((a,b)=>Number(b.semana)-Number(a.semana)||a.nombre.localeCompare(b.nombre));
  },[records]);
  const weeklyFiltered=useMemo(()=>weekFilter==='Todas'?weekly:weekly.filter(w=>String(w.semana)===String(weekFilter)),[weekly,weekFilter]);
  const weeklyGrouped=useMemo(()=>{const groups={};weeklyFiltered.forEach(it=>{groups[it.semana]=groups[it.semana]||[];groups[it.semana].push(it);});return Object.entries(groups).sort((a,b)=>Number(b[0])-Number(a[0]));},[weeklyFiltered]);

  const fichaEmp=useMemo(()=>employees.find(e=>e.legajo===fichaLeg)||null,[employees,fichaLeg]);
  const fichaRecs=useMemo(()=>records.filter(r=>r.legajo===fichaLeg).sort((a,b)=>a.fecha.localeCompare(b.fecha)),[records,fichaLeg]);
  const fichaStats=useMemo(()=>{const oper=fichaRecs.filter(r=>r.tipoEmpleado==='Operario');const prog=fichaRecs.filter(r=>!['Franco','Licencia','Vacaciones'].includes(r.estadoDia)).length;const pres=fichaRecs.filter(r=>['Presente','Tarde','Media jornada'].includes(r.estadoDia)).length;const avg=oper.length?Math.round(oper.reduce((a,r)=>a+(r.puntajeFinal||0),0)/oper.length):null;return {asistencia:prog?`${Math.round((pres/prog)*100)}%`:'0%',prodProm:oper.length?Math.round(oper.reduce((a,r)=>a+r.produccionReal,0)/oper.length):0,cumplProm:oper.length?`${Math.round(oper.reduce((a,r)=>a+r.cumplimiento,0)/oper.length)}%`:'0%',sem:semColor(avg,fichaEmp?.tipoEmpleado||'Operario','Presente')};},[fichaRecs,fichaEmp]);
  const compareEmployees=useMemo(()=>[fichaLeg,...compareLegs].filter(Boolean),[fichaLeg,compareLegs]);

  const dashboardDailySummary=useMemo(()=>{
    const grouped={};
    filteredRecords.forEach(r=>{
      grouped[r.fecha]=grouped[r.fecha]||{fecha:r.fecha,items:[],presentes:0,ausentes:0,tardes:0,horasSum:0,horasCount:0,prodSum:0,prodCount:0,cumSum:0,cumCount:0};
      const day=grouped[r.fecha];
      day.items.push(r);
      if(['Presente','Tarde','Media jornada'].includes(r.estadoDia))day.presentes++;
      if(r.estadoDia==='Ausente')day.ausentes++;
      if(r.estadoDia==='Tarde')day.tardes++;
      if(r.horas>0){day.horasSum+=r.horas;day.horasCount++;}
      if(r.produccionReal>0){day.prodSum+=r.produccionReal;day.prodCount++;}
      if(r.tipoEmpleado==='Operario'){day.cumSum+=r.cumplimiento;day.cumCount++;}
    });
    return Object.values(grouped).sort((a,b)=>compareDateAsc(a.fecha,b.fecha)).map(day=>({
      ...day,
      total:day.items.length,
      avgHoras:day.horasCount?Number((day.horasSum/day.horasCount).toFixed(1)):0,
      avgProd:day.prodCount?Math.round(day.prodSum/day.prodCount):0,
      avgCumpl:day.cumCount?Math.round(day.cumSum/day.cumCount):0,
      avgAsistencia:day.items.length?Math.round((day.presentes/day.items.length)*100):0
    }));
  },[filteredRecords]);

  const dashboardPeriodAverages=useMemo(()=>{
    const operRecords=filteredRecords.filter(r=>r.tipoEmpleado==='Operario');
    return {
      asistencia:filteredRecords.length?Math.round((filteredRecords.filter(r=>['Presente','Tarde','Media jornada'].includes(r.estadoDia)).length/filteredRecords.length)*100):0,
      horas:filteredRecords.filter(r=>r.horas>0).length?Number((filteredRecords.filter(r=>r.horas>0).reduce((a,r)=>a+r.horas,0)/filteredRecords.filter(r=>r.horas>0).length).toFixed(1)):0,
      produccion:operRecords.filter(r=>r.produccionReal>0).length?Math.round(operRecords.filter(r=>r.produccionReal>0).reduce((a,r)=>a+r.produccionReal,0)/operRecords.filter(r=>r.produccionReal>0).length):0,
      cumplimiento:operRecords.length?Math.round(operRecords.reduce((a,r)=>a+r.cumplimiento,0)/operRecords.length):0,
      dias:dashboardDailySummary.length
    };
  },[filteredRecords,dashboardDailySummary]);

  const dashboardCharts=useMemo(()=>({
    labels:dashboardDailySummary.map(day=>fmtDate(day.fecha)),
    attendance:dashboardDailySummary.map(day=>({presentes:day.presentes,tardes:day.tardes,ausentes:day.ausentes})),
    perf:dashboardDailySummary.map(day=>day.avgCumpl),
    prod:dashboardDailySummary.map(day=>day.avgProd),
    hours:dashboardDailySummary.map(day=>day.avgHoras),
    assist:dashboardDailySummary.map(day=>day.avgAsistencia)
  }),[dashboardDailySummary]);

  const presentTableRecords=useMemo(()=>records.filter(r=>(!presentListFilters.fecha||r.fecha===presentListFilters.fecha)&&(presentListFilters.legajo==='Todos'||r.legajo===presentListFilters.legajo)).sort((a,b)=>compareDateDesc(a.fecha,b.fecha)||String(a.nombre).localeCompare(String(b.nombre))),[records,presentListFilters]);
  const dailyTableRecords=useMemo(()=>records.filter(r=>(!dailyListFilters.fecha||r.fecha===dailyListFilters.fecha)&&(dailyListFilters.legajo==='Todos'||r.legajo===dailyListFilters.legajo)).sort((a,b)=>compareDateDesc(a.fecha,b.fecha)||String(a.nombre).localeCompare(String(b.nombre))),[records,dailyListFilters]);

  const historyRows=useMemo(()=>{
    const rows=[];
    records.forEach(r=>{
      rows.push({tipo:'Presentismo',fecha:r.fecha,semana:String(r.semana),legajo:r.legajo,nombre:r.nombre,sector:r.sector,estado:r.estadoDia,detalle:`E: ${r.entrada||'—'} | S: ${r.salida||'—'} | Obs: ${r.observaciones||'—'}`});
      rows.push({tipo:'Producción',fecha:r.fecha,semana:String(r.semana),legajo:r.legajo,nombre:r.nombre,sector:r.sector,estado:r.calidad,detalle:`Producción: ${r.produccionReal} | Meta: ${r.metaDiaria} | Cumpl.: ${r.cumplimiento}% | Semáforo: ${r.semaforo}`});
    });
    movements.forEach(m=>rows.push({tipo:'Movimientos',fecha:m.fecha,semana:'',legajo:m.legajo,nombre:m.nombre,sector:'',estado:m.cambio,detalle:`${m.valorAnterior} → ${m.valorNuevo} | ${m.observacion||'—'}`}));
    return rows.sort((a,b)=>compareDateDesc(a.fecha,b.fecha)||String(a.nombre).localeCompare(String(b.nombre)));
  },[records,movements]);
  const historyFiltered=useMemo(()=>historyRows.filter(r=>{
    if(histFilters.tipo!=='Todos'&&r.tipo!==histFilters.tipo)return false;
    if(!dateInRange(r.fecha,histFilters.fechaDesde,histFilters.fechaHasta))return false;
    if(histFilters.semana!=='Todas'&&r.semana!==String(histFilters.semana))return false;
    if(histFilters.estado!=='Todos'&&r.estado!==histFilters.estado)return false;
    if(histFilters.sector!=='Todos'&&r.sector!==histFilters.sector)return false;
    const q=histFilters.texto.trim().toLowerCase();
    if(q&&!([r.fecha,r.legajo,r.nombre,r.sector,r.estado,r.detalle,r.tipo].join(' ').toLowerCase().includes(q)))return false;
    return true;
  }),[historyRows,histFilters]);

  function recordMovement(entry){setMovements(p=>[{id:makeId('mov'),...entry},...p]);}
  function saveEmployee(){
    const legajo=(empForm.legajo||'').trim()||`AUTO-${Math.random().toString(36).slice(2,6)}`;
    const nombre=(empForm.nombre||'').trim()||`Empleado ${legajo}`;
    const sector=(empForm.sector||'').trim()||'Sin sector';
    const supervisor=(empForm.supervisor||'').trim();
    const metaDiaria=Number(empForm.metaDiaria||0);
    if(employees.some(e=>e.legajo===legajo&&e.id!==empForm.id)){alert('Ya existe un empleado con ese legajo.');return;}
    if(!empForm.id){
      const next={id:makeId('emp'),legajo,nombre,sector,turno:empForm.turno,tipoEmpleado:empForm.tipoEmpleado,supervisor,metaDiaria,activo:true};
      setEmployees(p=>[next,...p]);
      recordMovement({fecha:todayValue(),legajo,nombre,cambio:'Alta',valorAnterior:'-',valorNuevo:`${next.tipoEmpleado} | ${next.sector} | ${next.turno}`,autoriza:supervisor||'Sistema',activo:'Sí',observacion:'Alta de empleado'});
      setEmpForm(emptyEmp);return;
    }
    const prev=employees.find(e=>e.id===empForm.id);if(!prev)return;
    const upd={...prev,legajo,nombre,sector,turno:empForm.turno,tipoEmpleado:empForm.tipoEmpleado,supervisor,metaDiaria,activo:empForm.activo};
    setEmployees(p=>p.map(e=>e.id===upd.id?upd:e));
    if(prev.tipoEmpleado!==upd.tipoEmpleado||prev.sector!==upd.sector||prev.turno!==upd.turno||prev.metaDiaria!==upd.metaDiaria){recordMovement({fecha:todayValue(),legajo:upd.legajo,nombre:upd.nombre,cambio:'Actualización',valorAnterior:`${prev.tipoEmpleado} | ${prev.sector} | ${prev.turno} | Meta ${prev.metaDiaria}`,valorNuevo:`${upd.tipoEmpleado} | ${upd.sector} | ${upd.turno} | Meta ${upd.metaDiaria}`,autoriza:upd.supervisor||'Sistema',activo:upd.activo?'Sí':'No',observacion:'Edición manual'});}
    setEmpForm(emptyEmp);
  }
  function sendToBaja(id){
    const emp=employees.find(e=>e.id===id);if(!emp)return;if(!confirm(`¿Dar de baja a ${emp.nombre}?`))return;
    setEmployees(p=>p.map(e=>e.id===id?{...e,activo:false}:e));
    recordMovement({fecha:todayValue(),legajo:emp.legajo,nombre:emp.nombre,cambio:'Baja',valorAnterior:'Activo',valorNuevo:'Dado de baja',autoriza:'Sistema',activo:'No',observacion:'Baja lógica'});
    if(fichaLeg===emp.legajo){const next=activeEmployees.find(e=>e.id!==id);if(next)setFichaLeg(next.legajo);}
  }
  function reactivateEmployee(id){
    const emp=employees.find(e=>e.id===id);if(!emp)return;
    setEmployees(p=>p.map(e=>e.id===id?{...e,activo:true}:e));
    recordMovement({fecha:todayValue(),legajo:emp.legajo,nombre:emp.nombre,cambio:'Reactivación',valorAnterior:'Dado de baja',valorNuevo:'Activo',autoriza:'Sistema',activo:'Sí',observacion:'Reactivado sin perder historial'});
  }
  function addAttendance(){
    const emp=activeEmployees.find(e=>e.legajo===presentForm.legajo);if(!emp){alert('Primero cargá personal activo.');return;}
    setRecords(prev=>upsertAttendance(prev,emp,{...presentForm,fecha:normalizeDateInput(presentForm.fecha,todayValue())}).sort((a,b)=>compareDateDesc(a.fecha,b.fecha)||String(a.nombre).localeCompare(String(b.nombre))));
    setPresentListFilters({fecha:normalizeDateInput(presentForm.fecha,todayValue()),legajo:'Todos'});
    setPresentForm(p=>({...p,entrada:'',salida:'',observaciones:''}));
  }
  function importAttendance(rows){
    let next=[...records];
    rows.forEach(row=>{const emp=employees.find(e=>String(e.legajo)===String(row.legajo));if(emp)next=upsertAttendance(next,emp,row);});
    next.sort((a,b)=>compareDateDesc(a.fecha,b.fecha)||String(a.nombre).localeCompare(String(b.nombre)));
    setRecords(next);if(rows[0]?.fecha)setPresentListFilters({fecha:rows[0].fecha,legajo:'Todos'});
  }
  function addProduction(){
    const emp=activeEmployees.find(e=>e.legajo===dailyForm.legajo);if(!emp){alert('Primero cargá personal activo.');return;}
    setRecords(prev=>upsertProduction(prev,emp,{...dailyForm,fecha:normalizeDateInput(dailyForm.fecha,todayValue())}).sort((a,b)=>compareDateDesc(a.fecha,b.fecha)||String(a.nombre).localeCompare(String(b.nombre))));
    setDailyListFilters({fecha:normalizeDateInput(dailyForm.fecha,todayValue()),legajo:'Todos'});
    setDailyForm(p=>({...p,produccionReal:'',observaciones:''}));
  }
  function importProduction(rows){
    let next=[...records];
    rows.forEach(row=>{const emp=employees.find(e=>String(e.legajo)===String(row.legajo));if(emp)next=upsertProduction(next,emp,row);});
    next.sort((a,b)=>compareDateDesc(a.fecha,b.fecha)||String(a.nombre).localeCompare(String(b.nombre)));
    setRecords(next);if(rows[0]?.fecha)setDailyListFilters({fecha:rows[0].fecha,legajo:'Todos'});
  }
  function deleteRecord(id){if(!confirm('¿Eliminar este registro?'))return;setRecords(p=>p.filter(r=>r.id!==id));}
  function importEmployees(list){
    const seen=new Set(employees.map(e=>e.legajo));const toAdd=[];
    list.forEach(item=>{if(seen.has(item.legajo))return;seen.add(item.legajo);toAdd.push({...item,id:makeId('emp')});});
    if(!toAdd.length){alert('No hubo empleados nuevos para agregar.');return;}
    setEmployees(p=>[...toAdd,...p]);

      </div>}

      {tab==='ADMIN_PERSONAL'&&<div>
        <SecH title='Administración de personal' subtitle='La baja ahora es lógica: se mueve a "Personal dado de baja" y se puede reactivar.' right={<BtnP onClick={()=>setShowEmpImport(true)}>📥 Importar desde archivo</BtnP>} />
        <div style={{display:'grid',gridTemplateColumns:'370px 1fr',gap:'16px',alignItems:'start'}}>
          <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
              <KPI label='Activos' value={activeEmployees.length} bg={C.indigoL} color={C.indigoD}/>
              <KPI label='Baja' value={inactiveEmployees.length} bg={C.roseL} color={C.roseD}/>
              <KPI label='Operarios' value={activeEmployees.filter(e=>e.tipoEmpleado==='Operario').length} bg={C.emeraldL} color={C.emeraldD}/>
              <KPI label='Movimientos' value={movements.length} bg={C.amberL} color={C.amberD}/>
            </div>
            <Card>
              <CardTitle>{empForm.id?'✏️ Editando empleado':'➕ Nuevo empleado'}</CardTitle>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'14px'}}>
                <Field label='Legajo'><Inp placeholder='Auto si vacío' value={empForm.legajo} onChange={e=>setEmpForm(p=>({...p,legajo:e.target.value}))}/></Field>
                <Field label='Nombre'><Inp value={empForm.nombre} onChange={e=>setEmpForm(p=>({...p,nombre:e.target.value}))}/></Field>
                <Field label='Sector'><Inp value={empForm.sector} onChange={e=>setEmpForm(p=>({...p,sector:e.target.value}))}/></Field>
                <Field label='Turno'><Sel value={empForm.turno} onChange={e=>setEmpForm(p=>({...p,turno:e.target.value}))}>{TURNOS.map(t=><option key={t} value={t}>{t}</option>)}</Sel></Field>
                <Field label='Tipo'><Sel value={empForm.tipoEmpleado} onChange={e=>setEmpForm(p=>({...p,tipoEmpleado:e.target.value}))}>{ETYPES.map(t=><option key={t} value={t}>{t}</option>)}</Sel></Field>
                <Field label='Supervisor'><Inp value={empForm.supervisor} onChange={e=>setEmpForm(p=>({...p,supervisor:e.target.value}))}/></Field>
                <Field label='Meta diaria'><Inp type='number' min='0' value={empForm.metaDiaria} onChange={e=>setEmpForm(p=>({...p,metaDiaria:e.target.value}))}/></Field>
                <Field label='Activo'><Sel value={empForm.activo?'Sí':'No'} onChange={e=>setEmpForm(p=>({...p,activo:e.target.value==='Sí'}))}><option value='Sí'>Sí</option><option value='No'>No</option></Sel></Field>
              </div>
              <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}><BtnP onClick={saveEmployee}>{empForm.id?'Guardar cambios':'Agregar empleado'}</BtnP><BtnN onClick={()=>setEmpForm(emptyEmp)}>Limpiar</BtnN></div>
            </Card>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
            <div><SLabel>Personal activo</SLabel><DataTable headers={['Legajo','Nombre','Sector','Turno','Tipo','Supervisor','Meta','Acción']} rows={activeEmployees.map(e=>[<span key={e.id+'lg'} style={{fontFamily:'monospace',fontWeight:700,color:C.indigoD}}>{e.legajo}</span>,e.nombre,e.sector,e.turno,e.tipoEmpleado,e.supervisor||'—',e.metaDiaria,<div key={e.id+'ab'} style={{display:'flex',gap:'6px'}}><BtnS onClick={()=>setEmpForm({id:e.id,legajo:e.legajo,nombre:e.nombre,sector:e.sector,turno:e.turno,tipoEmpleado:e.tipoEmpleado,supervisor:e.supervisor,metaDiaria:String(e.metaDiaria),activo:e.activo})}>Editar</BtnS><BtnD onClick={()=>sendToBaja(e.id)}>Dar de baja</BtnD></div>])} searchQ={globalSearch}/></div>
            <div><SLabel>Personal dado de baja</SLabel><DataTable headers={['Legajo','Nombre','Sector','Turno','Tipo','Supervisor','Meta','Acción']} rows={inactiveEmployees.map(e=>[<span key={e.id+'lg'} style={{fontFamily:'monospace',fontWeight:700,color:C.roseD}}>{e.legajo}</span>,e.nombre,e.sector,e.turno,e.tipoEmpleado,e.supervisor||'—',e.metaDiaria,<BtnP key={e.id+'r'} onClick={()=>reactivateEmployee(e.id)} style={{padding:'6px 12px'}}>Reactivar</BtnP>])} searchQ={globalSearch}/></div>
            <div><SLabel>Historial de movimientos</SLabel><DataTable headers={['Fecha','Legajo','Nombre','Cambio','Antes','Después','Autoriza','Activo','Observación']} rows={movements.map(m=>[fmtDate(m.fecha),m.legajo,m.nombre,m.cambio,m.valorAnterior,m.valorNuevo,m.autoriza,m.activo,m.observacion])} searchQ={globalSearch}/></div>
          </div>
        </div>
      </div>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
